name: Build and Deploy to Render

# GitHub repository secrets expected by this workflow:
# - RENDER_DEPLOY_HOOK_URL
# or, if you prefer the Render API:
# - RENDER_API_KEY
# - RENDER_SERVICE_ID

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: render-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Deploy to Render with deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl --fail --silent --show-error \
            --request POST \
            "$RENDER_DEPLOY_HOOK_URL"

      - name: Deploy to Render with API
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL == '' && secrets.RENDER_API_KEY != '' && secrets.RENDER_SERVICE_ID != '' }}
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --url "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Accept: application/json"

      - name: Fail when Render secrets are missing
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL == '' && (secrets.RENDER_API_KEY == '' || secrets.RENDER_SERVICE_ID == '') }}
        run: |
          echo "Missing Render deployment secrets."
          echo "Set either:"
          echo "  - RENDER_DEPLOY_HOOK_URL"
          echo "or both:"
          echo "  - RENDER_API_KEY"
          echo "  - RENDER_SERVICE_ID"
          exit 1
