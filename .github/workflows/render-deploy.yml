name: Manual Render Deploy

# Required GitHub repository secret:
# - RENDER_DEPLOY_HOOK_URL
#
# This is a manual fallback redeploy workflow. The main CI/CD pipeline lives in
# .github/workflows/ci-cd.yml and should be the default path for production.

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Optional commit SHA to deploy. Leave blank to deploy the latest commit on main.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: render-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      COMMIT_SHA: ${{ inputs.commit_sha }}

    steps:
      - name: Fail when Render deploy hook secret is missing
        if: ${{ env.RENDER_DEPLOY_HOOK_URL == '' }}
        run: |
          echo "Missing RENDER_DEPLOY_HOOK_URL secret."
          exit 1

      - name: Trigger Render deploy
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          DEPLOY_URL="$RENDER_DEPLOY_HOOK_URL"

          if [ -n "$COMMIT_SHA" ]; then
            if [[ "$DEPLOY_URL" == *\?* ]]; then
              DEPLOY_URL="${DEPLOY_URL}&ref=${COMMIT_SHA}"
            else
              DEPLOY_URL="${DEPLOY_URL}?ref=${COMMIT_SHA}"
            fi
          fi

          curl --fail --silent --show-error \
            --request POST \
            "$DEPLOY_URL"
