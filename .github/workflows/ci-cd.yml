name: CI/CD

# This workflow publishes a GHCR image for traceability and reuse, then triggers
# Render to deploy the tested Git commit from the linked repository. If the
# service is later switched to Render's image runtime, update the deploy step to
# pass imgURL instead of ref.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

  build:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Fail when Render deploy hook secret is missing
        if: ${{ env.RENDER_DEPLOY_HOOK_URL == '' }}
        run: |
          echo "Missing RENDER_DEPLOY_HOOK_URL secret."
          exit 1

      - name: Trigger Render deploy for the tested commit
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          DEPLOY_URL="$RENDER_DEPLOY_HOOK_URL"

          if [[ "$DEPLOY_URL" == *\?* ]]; then
            DEPLOY_URL="${DEPLOY_URL}&ref=${GITHUB_SHA}"
          else
            DEPLOY_URL="${DEPLOY_URL}?ref=${GITHUB_SHA}"
          fi

          curl --fail --silent --show-error \
            --request POST \
            "$DEPLOY_URL"
