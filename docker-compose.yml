services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - backend-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-school_management}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-school_management}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
    restart: unless-stopped

  loki:
    image: grafana/loki:${LOKI_DOCKER_VERSION:-3.6.0}
    profiles: ['observability']
    command: ['-config.file=/etc/loki/config.yml']
    ports:
      - '3100:3100'
    volumes:
      - ./observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:3100/ready | grep -q ready']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - backend-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:${PROMTAIL_DOCKER_VERSION:-3.6.0}
    profiles: ['observability']
    command: ['-config.file=/etc/promtail/config.yml']
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - promtail_positions:/tmp
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:${PROMETHEUS_DOCKER_VERSION:-v3.10.0}
    profiles: ['observability']
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    depends_on:
      app:
        condition: service_healthy
    ports:
      - '9090:9090'
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:9090/-/healthy | grep -q Prometheus']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - backend-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:${GRAFANA_DOCKER_VERSION:-12.4.0}
    profiles: ['observability']
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_METRICS_ENABLED: 'true'
      GF_UNIFIED_ALERTING_ENABLED: 'true'
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    ports:
      - '3001:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards/json:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:3000/api/health | grep -q ok']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  loki_data:
  prometheus_data:
  grafana_data:
  promtail_positions:

networks:
  backend-network:
